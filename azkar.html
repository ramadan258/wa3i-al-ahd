<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الأذكار | واعي</title>
  <meta name="theme-color" content="#0c1320" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="today.css" />
  <link rel="icon" href="favicon.ico?v=2" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=2" />
  <link rel="apple-touch-icon" href="images/site-icon-512.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --reader-scale: .84;
      --reader-bg: #0c1320;
      --reader-card: rgba(14, 22, 34, .94);
      --reader-line: rgba(255,255,255,.08);
      --reader-soft: rgba(78,205,196,.14);
    }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      min-height: 100dvh;
      font-family: "Cairo", sans-serif;
      color: var(--text-light, #eaecf0);
      background:
        radial-gradient(circle at top left, rgba(78,205,196,.08), transparent 28%),
        radial-gradient(circle at top right, rgba(245,200,66,.06), transparent 24%),
        linear-gradient(180deg, #09111b 0%, var(--reader-bg) 100%);
    }

    .azkar-reader{
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 22px;
    }

    .reader-topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .reader-back{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--reader-line);
      background: rgba(255,255,255,.04);
      color: var(--text-light, #eaecf0);
      text-decoration:none;
      font-weight: 800;
      font-size: 13px;
    }

    .reader-back:hover{ border-color: rgba(78,205,196,.28); }

    .reader-shell{
      background: linear-gradient(180deg, rgba(15,22,34,.96), rgba(10,16,26,.94));
      border: 1px solid var(--reader-line);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,.38);
      overflow: hidden;
    }

    .reader-head{
      display:grid;
      grid-template-columns: minmax(0, 1.2fr) auto;
      gap: 14px;
      padding: 18px;
      border-bottom: 1px solid var(--reader-line);
      background: linear-gradient(135deg, rgba(78,205,196,.06), rgba(245,200,66,.04));
      align-items: center;
    }

    .reader-kicker{
      font-size: 11px;
      font-weight: 900;
      color: var(--gold, #f5c842);
      letter-spacing: .4px;
      margin-bottom: 6px;
    }

    .reader-title{
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      font-family: "Amiri", serif;
      color: var(--text-light, #eaecf0);
    }

    .reader-desc{
      margin: 8px 0 0;
      color: var(--text-muted, #92a0b3);
      font-size: 13px;
      line-height: 1.9;
      max-width: 56ch;
    }

    .reader-controls{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      flex-wrap: wrap;
    }

    .reader-switch{
      display:flex;
      gap:8px;
      padding:6px;
      border-radius:999px;
      background: rgba(255,255,255,.04);
      border:1px solid var(--reader-line);
    }

    .reader-switch-btn,
    .reader-tool-btn{
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: var(--text-light, #eaecf0);
      border-radius: 999px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 42px;
    }

    .reader-switch-btn.active{
      background: rgba(78,205,196,.14);
      color: var(--primary, #4ecdc4);
      border-color: rgba(78,205,196,.28);
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }

    .reader-tool-btn.primary{
      background: rgba(245,200,66,.14);
      color: var(--gold, #f5c842);
      border-color: rgba(245,200,66,.28);
    }

    .reader-tool-btn:hover,
    .reader-switch-btn:hover{
      transform: translateY(-1px);
    }

    .reader-body{
      padding: 16px;
    }

    .reader-note-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.03);
      color: var(--text-muted, #92a0b3);
      font-size: 12px;
      line-height: 1.8;
      flex-wrap: wrap;
    }

    .reader-zoom{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px;
      border-radius:999px;
      border:1px solid var(--reader-line);
      background: rgba(255,255,255,.03);
    }

    .reader-zoom button{
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      color: var(--text-light, #eaecf0);
      font-size: 18px;
      cursor:pointer;
    }

    .reader-zoom button:hover{ background: rgba(78,205,196,.14); }

    .reader-zoom-value{
      min-width: 52px;
      text-align:center;
      color: var(--text-light, #eaecf0);
      font-size: 12px;
      font-weight: 900;
    }

    .reader-frame-stage{
      position: relative;
      height: calc(100dvh - 255px);
      min-height: 620px;
      overflow: auto;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.06);
      background: linear-gradient(180deg, #fcfcf9, #f3f0e8);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.7),
        0 18px 38px rgba(0,0,0,.14);
    }

    .reader-frame{
      width: calc(100% / var(--reader-scale));
      height: calc(100% / var(--reader-scale));
      min-height: calc(100% / var(--reader-scale));
      border: 0;
      display: block;
      margin: 0 auto;
      transform: scale(var(--reader-scale));
      transform-origin: top center;
      background: white;
      box-shadow: 0 0 0 1px rgba(0,0,0,.03);
    }

    .reader-empty{
      min-height: 320px;
      display:grid;
      place-items:center;
      text-align:center;
      color: var(--text-muted, #92a0b3);
      padding: 20px;
      line-height: 1.9;
    }

    @media (max-width: 900px){
      .reader-head{
        grid-template-columns: 1fr;
      }
      .reader-controls{
        justify-content: flex-start;
      }
      .reader-frame-stage{
        height: calc(100dvh - 310px);
        min-height: 520px;
      }
    }

    @media (max-width: 640px){
      .azkar-reader{
        width: min(100%, calc(100% - 12px));
        padding: 8px 0 14px;
      }
      .reader-shell{
        border-radius: 20px;
      }
      .reader-head,
      .reader-body{
        padding: 12px;
      }
      .reader-frame-stage{
        height: calc(100dvh - 316px);
        min-height: 460px;
        border-radius: 16px;
      }
      .reader-note-bar{
        padding: 10px 12px;
        border-radius: 14px;
      }
      .reader-switch,
      .reader-zoom{
        width: 100%;
        justify-content: center;
      }
      .reader-switch-btn,
      .reader-tool-btn{
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="azkar-reader">
    <div class="reader-topbar">
      <a class="reader-back" href="index.html#today">← الرجوع إلى رحلة اليوم</a>
    </div>

    <section class="reader-shell">
      <div class="reader-head">
        <div>
          <div class="reader-kicker">صفحة قراءة مستقلة</div>
          <h1 class="reader-title" id="readerTitle">أذكار الصباح</h1>
          <p class="reader-desc" id="readerDesc">صفحة أهدأ وأسهل للقراءة على الهاتف، مع تصغير افتراضي حتى لا تبدو الأذكار ضخمة.</p>
        </div>

        <div class="reader-controls">
          <div class="reader-switch">
            <a class="reader-switch-btn" id="switchMorning" href="?type=morning">الصباح</a>
            <a class="reader-switch-btn" id="switchEvening" href="?type=evening">المساء</a>
          </div>
          <button class="reader-tool-btn primary" id="openSourceBtn" type="button">فتح المصدر الأصلي</button>
        </div>
      </div>

      <div class="reader-body">
        <div class="reader-note-bar">
          <div id="readerNote">المصدر: islambook</div>
          <div class="reader-zoom" aria-label="التحكم في حجم العرض">
            <button id="zoomOutBtn" type="button" aria-label="تصغير">−</button>
            <div class="reader-zoom-value" id="zoomValue">84%</div>
            <button id="zoomResetBtn" type="button" aria-label="الحجم الافتراضي">•</button>
            <button id="zoomInBtn" type="button" aria-label="تكبير">+</button>
          </div>
        </div>

        <div class="reader-frame-stage" id="readerStage">
          <iframe id="readerFrame" class="reader-frame" title="الأذكار" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
          <div class="reader-empty" id="readerEmpty" hidden>لم نتمكن من تجهيز صفحة الأذكار الآن. يمكنك استخدام زر فتح المصدر الأصلي.</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const AZKAR_MAP = {
        morning: {
          title: "أذكار الصباح",
          url: "https://www.islambook.com/AzkarPrint/1",
          note: "المصدر: islambook (نسخة الطباعة لأذكار الصباح). إذا رغبت بقراءة أصغر أو أكبر استخدم أدوات الحجم في الأعلى."
        },
        evening: {
          title: "أذكار المساء",
          url: "https://www.islambook.com/AzkarPrint/2",
          note: "المصدر: islambook (نسخة الطباعة لأذكار المساء). إذا رغبت بقراءة أصغر أو أكبر استخدم أدوات الحجم في الأعلى."
        }
      };

      const qs = (sel) => document.querySelector(sel);
      const params = new URLSearchParams(window.location.search);
      const type = String(params.get("type") || "morning").trim().toLowerCase() === "evening" ? "evening" : "morning";
      const cfg = AZKAR_MAP[type];
      const root = document.documentElement;

      const titleEl = qs("#readerTitle");
      const descEl = qs("#readerDesc");
      const noteEl = qs("#readerNote");
      const frameEl = qs("#readerFrame");
      const emptyEl = qs("#readerEmpty");
      const sourceBtn = qs("#openSourceBtn");
      const zoomValueEl = qs("#zoomValue");
      const switchMorning = qs("#switchMorning");
      const switchEvening = qs("#switchEvening");

      const defaultScale = window.matchMedia("(max-width: 640px)").matches ? 0.76 : 0.84;
      let scale = defaultScale;

      function clampScale(next) {
        return Math.max(0.66, Math.min(1.05, Number(next || defaultScale)));
      }

      function renderScale() {
        root.style.setProperty("--reader-scale", String(scale));
        zoomValueEl.textContent = `${Math.round(scale * 100)}%`;
      }

      function setTypeUI() {
        document.title = `${cfg.title} | واعي`;
        titleEl.textContent = cfg.title;
        descEl.textContent = "صفحة قراءة مستقلة ومريحة للهاتف، مع تصغير افتراضي وخيارات سريعة للحجم حتى تكون الأذكار أوضح.";
        noteEl.textContent = cfg.note;
        switchMorning.classList.toggle("active", type === "morning");
        switchEvening.classList.toggle("active", type === "evening");
      }

      function openSource() {
        window.open(cfg.url, "_blank", "noopener,noreferrer");
      }

      sourceBtn.addEventListener("click", openSource);
      qs("#zoomOutBtn").addEventListener("click", () => {
        scale = clampScale(scale - 0.06);
        renderScale();
      });
      qs("#zoomInBtn").addEventListener("click", () => {
        scale = clampScale(scale + 0.06);
        renderScale();
      });
      qs("#zoomResetBtn").addEventListener("click", () => {
        scale = defaultScale;
        renderScale();
      });

      frameEl.addEventListener("load", () => {
        emptyEl.hidden = true;
      });

      frameEl.addEventListener("error", () => {
        emptyEl.hidden = false;
      });

      setTypeUI();
      renderScale();
      frameEl.src = cfg.url;
    })();
  </script>
</body>
</html>
