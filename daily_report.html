<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>نموذج التقرير اليومي — قبيلة الموحدون</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <style>
    /* ── Site design tokens (mirrors style.css) ── */
    :root {
      --primary: #4ecdc4;
      --primary-glow: rgba(78,205,196,.18);
      --dark-bg: #0a0d12;
      --dark-card: #111520;
      --dark-card2: #161b26;
      --text-light: #eaecf0;
      --text-muted: #8892a4;
      --gold: #f5c842;
      --gold-glow: rgba(245,200,66,.15);
      --soft-border: rgba(245,200,66,.13);
      --green: #34d399;
      --card-shadow: 0 8px 32px rgba(0,0,0,.55);
      --glow-shadow: 0 0 30px rgba(78,205,196,.06);
      --radius: 22px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Cairo", Arial, sans-serif;
      background-color: var(--dark-bg);
      color: var(--text-light);
      min-height: 100vh;
      padding: 0 0 80px;
      position: relative;
      overflow-x: hidden;
      line-height: 1.9;
    }

    /* Ambient background matching the site */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 10%, rgba(78,205,196,.04) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 85%, rgba(245,200,66,.04) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 40%, rgba(100,80,180,.03) 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: "✦";
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 80px;
      color: rgba(245,200,66,.05);
      z-index: 0;
      pointer-events: none;
      animation: moonFloat 8s ease-in-out infinite;
    }

    @keyframes moonFloat {
      0%, 100% { transform: translateY(0) rotate(-5deg); opacity: .05; }
      50% { transform: translateY(-10px) rotate(5deg); opacity: .09; }
    }

    /* ── Back link ── */
    .back-bar {
      background: rgba(10,13,18,.92);
      backdrop-filter: blur(14px);
      padding: 12px 24px;
      border-bottom: 1px solid rgba(78,205,196,.08);
      position: relative;
      z-index: 10;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 13.5px;
      font-weight: 700;
      transition: color .2s;
    }
    .back-link:hover { color: var(--primary); }

    /* ── Page header ── */
    .page-header {
      background: radial-gradient(ellipse at 50% 0%, #0e2028 0%, var(--dark-bg) 70%);
      padding: 48px 20px 40px;
      text-align: center;
      border-bottom: 1px solid var(--soft-border);
      position: relative;
      z-index: 1;
      overflow: hidden;
      animation: fadeSlideDown .6s ease both;
    }
    .page-header::before {
      content: "التقرير";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 90px;
      font-weight: 900;
      color: rgba(78,205,196,.025);
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: .1em;
    }
    .page-header h1 {
      font-family: "Amiri", serif;
      font-size: 32px;
      color: var(--primary);
      text-shadow: 0 0 40px rgba(78,205,196,.25);
      position: relative;
      z-index: 1;
    }
    .page-header p {
      margin-top: 8px;
      font-size: 14px;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
    }
    .page-header .gold-tag {
      margin-top: 8px;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 1.5px;
      position: relative;
      z-index: 1;
    }
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Report banner ── */
    .report-banner {
      background: linear-gradient(90deg, #083d30, #0a1f1a, #083d30);
      color: var(--gold);
      text-align: center;
      padding: 12px 20px;
      font-size: 13.5px;
      letter-spacing: 2px;
      border-bottom: 1px solid rgba(245,200,66,.22);
      position: relative;
      z-index: 1;
    }

    /* ── Main wrapper ── */
    .wrap {
      width: min(860px, calc(100% - 40px));
      margin: 36px auto;
      position: relative;
      z-index: 1;
    }

    /* ── Wizard card ── */
    .card {
      background: linear-gradient(160deg, var(--dark-card2) 0%, var(--dark-card) 100%);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow), var(--glow-shadow);
      overflow: hidden;
      animation: fadeInUp .5s ease both;
      position: relative;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: var(--radius) var(--radius) 0 0;
      background: linear-gradient(90deg, transparent, rgba(78,205,196,.35), rgba(245,200,66,.25), transparent);
      pointer-events: none;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Card head ── */
    .cardHead {
      padding: 16px 22px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      background: linear-gradient(180deg, rgba(78,205,196,.07) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .cardHead .h {
      font-size: 14.5px;
      font-weight: 900;
      color: var(--text-light);
    }
    .cardHead .sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* ── Progress bar ── */
    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 160px;
      justify-content: flex-end;
    }
    #progText {
      font-size: 13px;
      font-weight: 900;
      color: var(--primary);
      min-width: 36px;
      text-align: left;
    }
    .bar {
      width: 110px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.06);
    }
    .bar > div {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--primary), var(--gold));
      border-radius: 999px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 8px rgba(78,205,196,.4);
    }

    .cardBody { padding: 24px 22px; }

    /* ── Step content ── */
    .stepTitle {
      font-family: "Amiri", serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .hint {
      color: var(--text-muted);
      font-size: 13.5px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    /* ── Form elements (matching today.css inputs) ── */
    label {
      display: block;
      margin-bottom: 7px;
      color: var(--text-muted);
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 12px 15px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,.09);
      background: rgba(0,0,0,.28);
      color: var(--text-light);
      font-family: "Cairo", sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(78,205,196,.45);
      box-shadow: 0 0 0 3px rgba(78,205,196,.1);
    }
    select option { background: var(--dark-card2); }
    textarea { min-height: 110px; resize: vertical; line-height: 1.8; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media(max-width: 600px) { .row { grid-template-columns: 1fr; } }

    /* ── Buttons (matching site .btn style) ── */
    .btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }

    button {
      font-family: "Cairo", sans-serif;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.05);
      color: var(--text-light);
      padding: 11px 18px;
      border-radius: 13px;
      cursor: pointer;
      font-weight: 900;
      font-size: 13.5px;
      transition: transform .15s, box-shadow .15s, border-color .2s, background .2s;
    }
    button:hover { transform: translateY(-2px); }
    button:active { transform: scale(.98); }

    button.primary {
      background: rgba(78,205,196,.18);
      color: var(--primary);
      border-color: rgba(78,205,196,.32);
    }
    button.primary:hover {
      background: rgba(78,205,196,.26);
      box-shadow: 0 8px 22px rgba(78,205,196,.15);
    }

    button.ghost {
      background: transparent;
      border-color: rgba(255,255,255,.1);
      color: var(--text-muted);
    }
    button.ghost:hover { border-color: rgba(255,255,255,.2); color: var(--text-light); }

    button.danger {
      background: rgba(255,99,99,.1);
      border-color: rgba(255,99,99,.28);
      color: #ffb4b4;
    }
    button.danger:hover { border-color: rgba(255,99,99,.5); }

    button.ok {
      background: rgba(52,211,153,.1);
      border-color: rgba(52,211,153,.28);
      color: var(--green);
    }
    button.ok:hover { background: rgba(52,211,153,.18); }

    button:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

    /* ── Habit card (matching task-card style) ── */
    .habitCard {
      background: linear-gradient(155deg, #151e2a, #0f1520);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
      box-shadow: 0 6px 22px rgba(0,0,0,.4);
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .habitCard::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,200,66,.15), transparent);
    }
    .habitCard:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,.5);
      border-color: rgba(78,205,196,.15);
    }

    .habitLeft { flex: 1; }
    .habitName {
      font-size: 14.5px;
      font-weight: 800;
      color: var(--text-light);
      margin-bottom: 5px;
      line-height: 1.5;
    }
    .habitMeta { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

    .toggle {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .chip {
      font-size: 12.5px;
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,.09);
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.2);
      display: inline-flex;
      gap: 7px;
      align-items: center;
      user-select: none;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .chip:hover { border-color: rgba(78,205,196,.3); background: rgba(78,205,196,.05); }
    .chip input { accent-color: var(--primary); }

    .countBox {
      display: flex;
      gap: 8px;
      align-items: center;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(0,0,0,.2);
    }
    .countBox input {
      width: 80px;
      padding: 6px 8px;
      border-radius: 10px;
    }

    /* ── Score badge ── */
    .scoreBadge {
      display: flex;
      align-items: center;
      gap: 20px;
      background: linear-gradient(155deg, rgba(245,200,66,.06), rgba(245,200,66,.02));
      border: 1px solid rgba(245,200,66,.16);
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }
    .scoreNum {
      font-family: "Amiri", serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 30px rgba(245,200,66,.3);
    }
    .scoreLabel { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .scoreStats { font-size: 13px; color: var(--text-muted); line-height: 2; }
    .scoreStats span { color: var(--text-light); font-weight: 900; }

    /* ── Progress dots for habit questions ── */
    .qDots { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 16px; }
    .qDot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.07);
      transition: all .3s;
    }
    .qDot.active { background: var(--primary); box-shadow: 0 0 7px rgba(78,205,196,.5); }
    .qDot.done { background: var(--green); border-color: var(--green); }

    /* ── Section badge ── */
    .sectionBadge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 13px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: .3px;
    }
    .sectionBadge.ramadan {
      background: rgba(245,200,66,.07);
      border: 1px solid rgba(245,200,66,.18);
      color: var(--gold);
    }
    .sectionBadge.daily {
      background: var(--primary-glow);
      border: 1px solid rgba(78,205,196,.22);
      color: var(--primary);
    }

    /* ── Intro special ── */
    .introCard { text-align: center; padding: 8px 0 4px; }
    .introMoon { width: 64px; height: 64px; margin: 0 auto 14px; }
    .introTitle {
      font-family: "Amiri", serif;
      font-size: 28px;
      color: var(--gold);
      margin-bottom: 6px;
      text-shadow: 0 0 30px rgba(245,200,66,.2);
    }
    .introSub {
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 400px;
      margin: 0 auto 22px;
    }

    /* ── Divider ── */
    .hr {
      height: 1px;
      background: rgba(255,255,255,.05);
      margin: 18px 0;
    }

    .list { display: flex; flex-direction: column; gap: 10px; }
    .small { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

    /* ── Report box ── */
    .reportBox {
      width: 100%;
      min-height: 400px;
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 13px;
      padding: 16px;
      color: var(--text-light);
      outline: none;
      resize: vertical;
    }
    .reportBox:focus { border-color: rgba(78,205,196,.3); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,13,18,.92);
      border: 1px solid rgba(78,205,196,.2);
      color: var(--text-light);
      padding: 11px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      box-shadow: 0 8px 28px rgba(0,0,0,.55);
      backdrop-filter: blur(14px);
      z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Animations ── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(16px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .anim-in { animation: slideIn .3s ease both; }

    /* ── Responsive ── */
    @media(max-width: 640px) {
      .wrap { width: calc(100% - 28px); margin: 20px auto; }
      .cardBody { padding: 18px 16px; }
      .cardHead { padding: 14px 16px; }
      .stepTitle { font-size: 20px; }
      .page-header { padding: 36px 16px 30px; }
      .page-header h1 { font-size: 26px; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(78,205,196,.2); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(78,205,196,.35); }
  </style>
</head>
<body>

<!-- Back nav -->
<div class="back-bar">
  <a href="index.html" class="back-link">← العودة إلى الموقع</a>
</div>

<!-- Page Header -->
<div class="page-header">
  <h1>🧭 تقرير التعافي اليومي</h1>
  <p>قبيلة الموحدون — واعي</p>
  <p class="gold-tag" id="todayPill">📅 جارِ التحميل…</p>
</div>

<!-- Covenant Banner -->
<div class="report-banner">
  🤝 نموذج يومي للثبات، المتابعة، وبناء حياة تعافٍ جديدة بإذن الله
</div>

<div class="wrap">
  <div class="card">
    <div class="cardHead">
      <div>
        <div class="h" id="stepHeader">الخطوة 1</div>
        <div class="sub" id="stepSub">نبدأ بالمعلومات الأساسية</div>
      </div>
      <div class="progress">
        <div id="progText">0%</div>
        <div class="bar"><div id="progBar"></div></div>
      </div>
    </div>
    <div class="cardBody" id="app"></div>
  </div>
</div>

<div class="toast" id="toast">تم ✅</div>

<script>
(function(){
  const $ = (q)=>document.querySelector(q);

  // ---------- Helpers ----------
  const todayISO = new Date().toISOString().slice(0,10);
  const pill = document.getElementById("todayPill");
  if(pill) pill.textContent = "📅 " + new Date().toLocaleDateString("ar-SA", {weekday:"long", year:"numeric", month:"long", day:"numeric"});

  const toast = (msg)=>{
    const t = $("#toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 1500);
  };

  const loadState = ()=>{
    try{
      const raw = localStorage.getItem("tribe_report_state_v2");
      if(!raw) return null;
      return JSON.parse(raw);
    }catch(e){ return null; }
  };

  const saveState = ()=>{
    localStorage.setItem("tribe_report_state_v2", JSON.stringify(state));
  };

  const defaultState = {
    dateISO: todayISO,
    hijriDate: "",
    recoveryDay: "",
    answers: {}, // id => {done:boolean, count:number}
    avoided: [""],
    gratitude: ["","",""],
    feelingPreset: "متفائل",
    feelingCustom: "",
    summary: "",
    motivation: [""],
    notes: [
      "",
      "",
      ""
    ],
  };

  let state = loadState();
  if(!state) state = structuredClone(defaultState);
  if(!state.dateISO) state.dateISO = todayISO;
  if(typeof state.motivation === "string") state.motivation = state.motivation ? [state.motivation] : [""];
  if(!Array.isArray(state.motivation)) state.motivation = [""];
  if(!Array.isArray(state.notes)) state.notes = ["","",""];
  if(!Array.isArray(state.avoided)) state.avoided = [""];
  if(!Array.isArray(state.gratitude)) state.gratitude = ["","",""];

  // ---------- Habits Definition ----------
  const recoveryHabits = [
    { id:"habit_fard_mosque", name:"أداء صلوات الفريضة جماعة فالمسجد 🕌", type:"bool" },
    { id:"habit_sleep", name:"النوم الجيد 😪", type:"bool" },
    { id:"habit_adhkar", name:"قراءة اذكار الصباح والمساء 📿", type:"bool" },
    { id:"habit_quran", name:"قراءة الورد اليومي من القرآن الكريم 🌱", type:"bool" },
    { id:"habit_lower_gaze", name:"غض البصر ✋🏻", type:"bool" },
    { id:"habit_obligations", name:"أداء الإلتزامات اليومية 🏆", type:"bool" },
    { id:"habit_food", name:"تجنب الطعام الضار 🚫", type:"bool" },
    { id:"habit_learn", name:"التثقف عن التعافي 🧗🏻", type:"bool" },
    { id:"habit_exercise", name:"ممارسة الرياضة 💪🏻", type:"bool" },
    { id:"habit_teeth", name:"تفريش الأسنان 🪥", type:"bool" },
    { id:"habit_cold_shower", name:"الإستحمام بالماء البارد ❄️", type:"bool" },
    { id:"habit_journal", name:"كتابة اليوميات ✍🏻", type:"bool" },
    { id:"habit_book", name:"قراءة كتاب لمدة ٥ دقائق 📚", type:"bool" },
    { id:"habit_clean_porn", name:"يوم نظيف بلا إباحية 👑", type:"bool" },
    { id:"habit_clean_mast", name:"يوم نظيف بلا إستمناء 👑", type:"bool" },
  ];

  // init default answers if missing
  const initAnswers = ()=>{
    const all = [...recoveryHabits];

        ta.focus(); ta.select();
        document.execCommand("copy");
        toast("تم النسخ ✅");
      }
    };

    $("#saveToday").onclick = ()=>{
      const key = "tribe_reports_archive_v2";
      const archive = JSON.parse(localStorage.getItem(key) || "[]");
      archive.unshift({
        dateISO: state.dateISO || todayISO,
        hijriDate: state.hijriDate,
        completedHabits: computeScores().doneTotal,
        report
      });
      localStorage.setItem(key, JSON.stringify(archive.slice(0,90)));
      toast("تم حفظ نسخة اليوم ✅");
    };

    $("#prev").onclick = ()=>go(-1);

    $("#clear").onclick = ()=>{
      if(confirm("متأكد تمسح كل شيء؟")){
        localStorage.removeItem("tribe_report_state_v2");
        toast("تم المسح");
        location.reload();
      }
    };
  };

  function render(){
    setProgress();
    const id = steps[stepIndex].id;

    if(id==="intro") return renderIntro();
    if(id==="habits_recovery") return renderHabitStep("recovery");
    if(id==="avoided") return renderAvoided();
    if(id==="gratitude") return renderGratitude();
    if(id==="feeling") return renderFeeling();
    if(id==="summary") return renderSummary();
    if(id==="motivation") return renderMotivation();
    if(id==="notes") return renderNotes();
    if(id==="report") return renderReport();
  }

  render();
})();
</script>
</body>
</html>
