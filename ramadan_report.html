<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#080b10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>تقرير التعافي — قبيلة الموحدون</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <style>
/* ═══════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════ */
:root {
  --bg:        #080b10;
  --card:      #0f1420;
  --card2:     #141b28;
  --line:      rgba(255,255,255,.07);
  --text:      #eaecf0;
  --muted:     #7a8899;
  --teal:      #4ecdc4;
  --teal-dim:  rgba(78,205,196,.14);
  --teal-glow: rgba(78,205,196,.28);
  --gold:      #f5c842;
  --gold-dim:  rgba(245,200,66,.12);
  --gold-glow: rgba(245,200,66,.28);
  --green:     #34d399;
  --red:       #f87171;
  --r: 18px;
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html { scroll-behavior: smooth; }

body {
  font-family: "Cairo", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  line-height: 1.8;
  overflow-x: hidden;
}

/* Ambient glow */
body::before {
  content: "";
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 800px 500px at 20% 0%, rgba(78,205,196,.055), transparent 60%),
    radial-gradient(ellipse 600px 400px at 90% 15%, rgba(245,200,66,.04), transparent 55%),
    radial-gradient(ellipse 500px 600px at 50% 110%, rgba(78,205,196,.03), transparent 60%);
}

/* ═══════════════════════════════════════════════
   FLOATING POINTS COUNTER
═══════════════════════════════════════════════ */
#livePts {
  position: fixed;
  top: env(safe-area-inset-top, 0px);
  left: 0; right: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 16px;
  background: rgba(8,11,16,.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line);
}
.pts-back {
  text-decoration: none;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  transition: color .2s;
}
.pts-back:hover { color: var(--teal); }
.pts-center {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  justify-content: center;
}
.pts-bar-wrap {
  flex: 1;
  max-width: 140px;
  height: 5px;
  border-radius: 999px;
  background: rgba(255,255,255,.07);
  overflow: hidden;
}
.pts-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--teal), var(--gold));
  border-radius: 999px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 6px var(--teal-glow);
}
.pts-num {
  font-size: 15px;
  font-weight: 900;
  color: var(--gold);
  min-width: 52px;
  text-align: center;
  transition: transform .2s;
  white-space: nowrap;
}
.pts-num.bump { animation: ptsBump .25s ease; }
@keyframes ptsBump {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.22); }
}
.pts-date {
  font-size: 11.5px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════
   PAGE HEADER
═══════════════════════════════════════════════ */
.page-head {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 72px 20px 28px;
  border-bottom: 1px solid rgba(245,200,66,.1);
  background: radial-gradient(ellipse at 50% 0%, #0d1f28, var(--bg) 70%);
  overflow: hidden;
}
.page-head::before {
  content: "التقرير";
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 80px; font-weight: 900;
  color: rgba(78,205,196,.025);
  white-space: nowrap; pointer-events: none;
}
.page-head h1 {
  font-family: "Amiri", serif;
  font-size: 26px;
  color: var(--teal);
  text-shadow: 0 0 30px var(--teal-glow);
  position: relative; z-index: 1;
}
.page-head p {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
  position: relative; z-index: 1;
}

.ramadan-bar {
  background: linear-gradient(90deg, #062a20, #091a14, #062a20);
  color: var(--gold);
  text-align: center;
  padding: 10px 16px;
  font-size: 12.5px;
  letter-spacing: 1.5px;
  border-bottom: 1px solid rgba(245,200,66,.18);
  position: relative; z-index: 1;
}

/* ═══════════════════════════════════════════════
   WIZARD SHELL
═══════════════════════════════════════════════ */
.wizard {
  position: relative; z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 16px 14px 80px;
}

/* ── Step card ── */
.step-card {
  background: linear-gradient(160deg, var(--card2), var(--card));
  border: 1px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  position: relative;
}
.step-card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--teal-glow), rgba(245,200,66,.25), transparent);
  pointer-events: none;
}

/* Card head */
.card-head {
  padding: 13px 16px;
  border-bottom: 1px solid var(--line);
  background: rgba(78,205,196,.05);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.head-title { font-size: 13.5px; font-weight: 900; color: var(--text); }
.head-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }
.head-prog  { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.head-prog-bar {
  width: 72px; height: 5px; border-radius: 999px;
  background: rgba(255,255,255,.06); overflow: hidden;
}
.head-prog-fill {
  height: 100%; width: 0;
  background: linear-gradient(90deg, var(--teal), var(--gold));
  border-radius: 999px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}
.head-prog-pct { font-size: 12px; font-weight: 900; color: var(--teal); min-width: 32px; }

/* Card body */
.card-body { padding: 18px 16px; }

/* ═══════════════════════════════════════════════
   TYPOGRAPHY
═══════════════════════════════════════════════ */
.step-title {
  font-family: "Amiri", serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--teal);
  margin-bottom: 6px;
}
.step-hint {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 18px;
}

/* ═══════════════════════════════════════════════
   FORM
═══════════════════════════════════════════════ */
.field-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
input[type="text"],
input[type="number"],
textarea,
select {
  width: 100%;
  padding: 13px 14px;
  border-radius: 13px;
  border: 1px solid var(--line);
  background: rgba(0,0,0,.3);
  color: var(--text);
  font-family: "Cairo", sans-serif;
  font-size: 15px; /* prevent iOS zoom */
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color .2s, box-shadow .2s;
}
input:focus, textarea:focus, select:focus {
  border-color: rgba(78,205,196,.4);
  box-shadow: 0 0 0 3px rgba(78,205,196,.09);
}
textarea { min-height: 100px; resize: vertical; line-height: 1.7; }
select option { background: var(--card2); }

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width: 480px) { .row-2 { grid-template-columns: 1fr; } }

/* ═══════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════ */
.btns {
  display: flex;
  gap: 10px;
  margin-top: 18px;
  flex-wrap: wrap;
}
.btns-col { flex-direction: column; }

btn, .btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: "Cairo", sans-serif;
  font-size: 14px;
  font-weight: 900;
  padding: 13px 18px;
  border-radius: 13px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.05);
  color: var(--text);
  cursor: pointer;
  transition: transform .15s, box-shadow .15s, border-color .2s, background .2s;
  touch-action: manipulation;
  text-decoration: none;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: scale(.97); }

.btn-primary {
  background: var(--teal-dim);
  color: var(--teal);
  border-color: rgba(78,205,196,.3);
  flex: 1;
}
.btn-primary:hover { background: rgba(78,205,196,.22); box-shadow: 0 6px 20px rgba(78,205,196,.15); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border-color: rgba(255,255,255,.08);
}
.btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.16); }

.btn-ok {
  background: rgba(52,211,153,.1);
  color: var(--green);
  border-color: rgba(52,211,153,.25);
}
.btn-ok:hover { background: rgba(52,211,153,.18); }

.btn-danger {
  background: rgba(248,113,113,.08);
  color: #fca5a5;
  border-color: rgba(248,113,113,.2);
}
.btn-danger:hover { background: rgba(248,113,113,.16); }

.btn-full { width: 100%; }

/* ═══════════════════════════════════════════════
   HABIT QUESTION CARD
═══════════════════════════════════════════════ */
.section-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 999px;
  font-size: 11.5px; font-weight: 900; margin-bottom: 12px;
}
.badge-ramadan { background: var(--gold-dim); border: 1px solid rgba(245,200,66,.2); color: var(--gold); }
.badge-daily   { background: var(--teal-dim);  border: 1px solid rgba(78,205,196,.2);  color: var(--teal); }

/* Dots */
.q-dots { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px; }
.q-dot  { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.08); transition: all .3s; }
.q-dot.active { background: var(--teal); box-shadow: 0 0 6px var(--teal-glow); }
.q-dot.done   { background: var(--green); }

/* Habit block */
.habit-block {
  background: rgba(0,0,0,.22);
  border: 1px solid var(--line);
  border-radius: 15px;
  padding: 15px 14px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.habit-block::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(245,200,66,.14), transparent);
}
.habit-name  { font-size: 14.5px; font-weight: 800; color: var(--text); margin-bottom: 4px; line-height: 1.45; }
.habit-pts   { font-size: 12px; color: var(--muted); }
.habit-pts b { color: var(--gold); }

/* Point preview badge (live) */
.pts-preview {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 999px;
  background: rgba(245,200,66,.08);
  border: 1px solid rgba(245,200,66,.18);
  color: var(--gold);
  font-size: 12px; font-weight: 900;
  margin-top: 8px;
}

.toggle-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

.chip-label {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 14px; border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(0,0,0,.2);
  font-size: 13.5px; color: var(--muted);
  cursor: pointer;
  transition: border-color .2s, background .2s, color .2s;
  touch-action: manipulation;
  user-select: none;
}
.chip-label input { accent-color: var(--teal); }
.chip-label:has(input:checked) {
  border-color: rgba(78,205,196,.4);
  background: rgba(78,205,196,.08);
  color: var(--teal);
}

.count-wrap {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px;
}
.count-wrap input {
  width: 90px;
  padding: 10px 12px;
  text-align: center;
  font-size: 17px;
  font-weight: 900;
}

/* ═══════════════════════════════════════════════
   LIST ITEMS (avoided / gratitude)
═══════════════════════════════════════════════ */
.list-items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

.list-row {
  display: flex; align-items: center; gap: 8px;
}
.list-row input { flex: 1; }
.list-row .btn-danger { padding: 10px 13px; flex-shrink: 0; font-size: 13px; }

/* ═══════════════════════════════════════════════
   INTRO SCREEN
═══════════════════════════════════════════════ */
.intro-moon {
  width: 56px; height: 56px; margin: 0 auto 14px;
}
.intro-moon svg { width: 100%; height: 100%; }
.intro-heading {
  font-family: "Amiri", serif;
  font-size: 26px;
  color: var(--gold);
  text-align: center;
  margin-bottom: 5px;
  text-shadow: 0 0 24px var(--gold-glow);
}
.intro-sub {
  font-size: 13px; color: var(--muted);
  text-align: center; line-height: 1.7;
  max-width: 380px; margin: 0 auto 20px;
}

/* ═══════════════════════════════════════════════
   SCORE / REPORT SCREEN
═══════════════════════════════════════════════ */
.score-hero {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 16px;
  background: linear-gradient(135deg, var(--gold-dim), rgba(245,200,66,.03));
  border: 1px solid rgba(245,200,66,.18);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}
.score-big {
  font-family: "Amiri", serif;
  font-size: 52px; font-weight: 700;
  color: var(--gold); line-height: 1;
  text-shadow: 0 0 24px var(--gold-glow);
}
.score-lbl  { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: .4px; }
.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.score-item {
  background: rgba(0,0,0,.22); border: 1px solid var(--line);
  border-radius: 11px; padding: 9px 10px;
}
.score-item-val { font-size: 15px; font-weight: 900; color: var(--text); }
.score-item-lbl { font-size: 11px; color: var(--muted); margin-top: 1px; }

.report-box {
  width: 100%;
  min-height: 260px;
  max-height: 360px;
  white-space: pre-wrap;
  line-height: 1.75;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  background: rgba(0,0,0,.32);
  border: 1px solid var(--line);
  border-radius: 13px;
  padding: 14px;
  color: var(--text);
  outline: none;
  resize: vertical;
  overflow: auto;
}
.report-box:focus { border-color: rgba(78,205,196,.3); }

/* ═══════════════════════════════════════════════
   DIVIDER & UTILS
═══════════════════════════════════════════════ */
.hr { height: 1px; background: var(--line); margin: 16px 0; }
.small { font-size: 11.5px; color: var(--muted); line-height: 1.6; }
.anim-in { animation: slideIn .28s ease both; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(14px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
#toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: rgba(8,11,16,.92);
  border: 1px solid rgba(78,205,196,.22);
  color: var(--text);
  padding: 11px 20px;
  border-radius: 999px;
  font-size: 13px; font-weight: 700;
  opacity: 0; pointer-events: none;
  transition: opacity .22s, transform .22s;
  backdrop-filter: blur(14px);
  z-index: 300;
  white-space: nowrap;
  max-width: calc(100vw - 32px);
  text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════════ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(78,205,196,.2); border-radius: 999px; }
  </style>
</head>
<body>

<!-- Live points bar -->
<div id="livePts">
  <a href="index.html" class="pts-back">← الرئيسية</a>
  <div class="pts-center">
    <div class="pts-bar-wrap"><div class="pts-bar-fill" id="ptsBarFill"></div></div>
    <div class="pts-num" id="ptsNum">0 🏅</div>
  </div>
  <div class="pts-date" id="ptsDate">—</div>
</div>

<!-- Page header -->
<div class="page-head">
  <h1>🧭 تقرير التعافي اليومي</h1>
  <p>قبيلة الموحدون — واعي</p>
</div>

<div class="ramadan-bar">🌙 عهدٌ مع الله – وعيٌ بالنفس – ثباتٌ حتى رمضان</div>

<!-- Wizard -->
<div class="wizard">
  <div class="step-card">
    <div class="card-head">
      <div>
        <div class="head-title" id="stepHeader">الخطوة 1</div>
        <div class="head-sub"  id="stepSub">—</div>
      </div>
      <div class="head-prog">
        <div class="head-prog-bar"><div class="head-prog-fill" id="progBar"></div></div>
        <div class="head-prog-pct" id="progText">0%</div>
      </div>
    </div>
    <div class="card-body" id="app"></div>
  </div>
</div>

<div id="toast">تم ✅</div>

<script>
(function(){
"use strict";

/* ─────────────────────────────────────────
   HELPERS
───────────────────────────────────────── */
const $ = q => document.querySelector(q);
const todayISO = new Date().toISOString().slice(0,10);

// Date pill
(()=>{
  const d = new Date();
  const el = $("#ptsDate");
  if(el) el.textContent = d.toLocaleDateString("ar-SA",{month:"short",day:"numeric"});
})();

const toast = msg => {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1600);
};

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
const KEY = "tribe_report_state_v2";

const loadState = () => {
  try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; } catch { return null; }
};
const saveState = () => localStorage.setItem(KEY, JSON.stringify(state));

const defaultState = {
  dateISO: todayISO, hijriDate: "", recoveryDay: "",
  answers: {},
  avoided: [""],
  gratitude: ["","",""],
  feelingPreset: "متفائل", feelingCustom: "",
  summary: "", motivation: "",
  notes: [
    "📌 أذكر نفسي بالتركيز على الهدف",
    "📌 أذكر نفسي بإنجاز جميع مهامي قبل الساعة الثامنة مساءً",
    "📌 أذكر نفسي بعدم التسويف"
  ],
};

let state = loadState() || structuredClone(defaultState);
if(!state.dateISO) state.dateISO = todayISO;

/* ─────────────────────────────────────────
   HABITS
───────────────────────────────────────── */
const ramadanHabits = [
  { id:"ramadan_rawatib",        name:"السنن الرواتب جميعها 🌙",                   type:"bool",  points:20 },
  { id:"ramadan_taraweeh",       name:"صلاة التراويح 🌙",                          type:"count", unitLabel:"كم ركعتين؟",           pointsPerUnit:10 },
  { id:"ramadan_fard_mosque",    name:"صلوات الفريضة في المسجد جماعة 🌙",          type:"count", unitLabel:"كم صلاة؟ (0-5)",        pointsPerUnit:10 },
  { id:"ramadan_adhkar_after",   name:"أذكار بعد الصلاة الفريضة 🌙",               type:"count", unitLabel:"كم مرة؟ (0-5)",         pointsPerUnit:10 },
  { id:"ramadan_quran_juz",      name:"قراءة جزء من القرآن الكريم 🌙",             type:"bool",  points:20 },
  { id:"ramadan_less_sugar",     name:"عدم الإكثار من السكر 🌙",                   type:"bool",  points:20 },
  { id:"ramadan_sadaqah",        name:"الصدقة 🌙",                                 type:"bool",  points:20 },
  { id:"ramadan_duha",           name:"صلاة الضحى 🌙",                             type:"bool",  points:20 },
  { id:"ramadan_sleep_adhkar",   name:"أذكار النوم 🌙",                             type:"bool",  points:20 },
  { id:"ramadan_mosque_sunrise", name:"الجلوس في المسجد حتى طلوع الشمس 🌙",        type:"bool",  points:30 },
];

/* ─────────────────────────────────────────
   SCORING
───────────────────────────────────────── */
function habitLabel(h,a){
  return h.type==="count" ? `${h.name} (${Number(a.count||0)})` : h.name;
}

function computeScores(){
  let points=0, doneTotal=0, totalTotal=0, doneRamadan=0, doneDaily=0;
  const ramadanDone=[],ramadanNot=[],dailyDone=[],dailyNot=[];

  for(const h of ramadanHabits){
    totalTotal++;
    const a=state.answers[h.id]||{done:false,count:0};
    let achieved=false,p=0;
    if(h.type==="bool"){ achieved=!!a.done; if(achieved)p+=h.points||0; if(!achieved&&h.penaltyIfFalse)p-=h.penaltyIfFalse; }
    else{ const c=Number(a.count||0); achieved=c>0; p+=(h.pointsPerUnit||0)*c; }
    points+=p;
    if(achieved){doneTotal++;doneRamadan++;ramadanDone.push(habitLabel(h,a));}
    else ramadanNot.push(habitLabel(h,a));
  }
  for(const h of dailyHabits){
    totalTotal++;
    const a=state.answers[h.id]||{done:false,count:0};
    let achieved=false,p=0;
    if(h.type==="bool"){ achieved=!!a.done; if(achieved)p+=h.points||0; if(!achieved&&h.penaltyIfFalse)p-=h.penaltyIfFalse; }
    else{ const c=Number(a.count||0); achieved=c>0; p+=(h.pointsPerUnit||0)*c; }
    points+=p;
    if(achieved){doneTotal++;doneDaily++;dailyDone.push(habitLabel(h,a));}
    else dailyNot.push(habitLabel(h,a));
  }
  return{points,doneTotal,totalTotal,doneRamadan,totalRamadan:ramadanHabits.length,
    doneDaily,totalDaily:dailyHabits.length,ramadanDone,ramadanNot,dailyDone,dailyNot};
}

}

/* ── HABITS ── */
function getHabits(sec){ return sec==="ramadan"?ramadanHabits:dailyHabits; }

function renderHabitStep(section){
  if(habitFlow.section!==section){ habitFlow.section=section; habitFlow.index=0; }
  const habits=getHabits(section);
  const total=habits.length;
  const h=habits[habitFlow.index];
  const a=state.answers[h.id]||{done:false,count:0};

  const ptsHint=h.type==="count"
    ? `كل وحدة = ${h.pointsPerUnit} نقطة`
    : `${h.points} نقطة`+(h.penaltyIfFalse?` (إذا لا: خصم ${h.penaltyIfFalse})`:"");

  const curPts=h.type==="count"
    ? (h.pointsPerUnit||0)*Number(a.count||0)
    : (a.done?(h.points||0):(!a.done&&h.penaltyIfFalse?-h.penaltyIfFalse:0));

  const inputUI=h.type==="count"?`
    <div class="count-wrap">
      <label class="field-label" style="margin:0;white-space:nowrap">${escHtml(h.unitLabel||"العدد")}</label>
      <input id="cnt" type="number" min="0" value="${Number(a.count||0)}" />
    </div>`:`
    <div class="toggle-row">
      <label class="chip-label"><input id="done" type="checkbox" ${a.done?"checked":""}/>✅ نعم</label>
      <label class="chip-label"><input id="notd" type="checkbox" ${!a.done?"checked":""}/>❌ لا</label>
    </div>`;

  app.innerHTML=`
  <div class="anim-in">
    <div class="section-badge ${section==="ramadan"?"badge-ramadan":"badge-daily"}">${section==="ramadan"?"🌙 عادات رمضان":"🌿 عادات القبيلة"}</div>
    <div class="q-dots">${habits.map((_,i)=>`<div class="q-dot${i===habitFlow.index?" active":i<habitFlow.index?" done":""}"></div>`).join("")}</div>

    <div class="habit-block">
      <div class="habit-name">${escHtml(h.name)}</div>
      <div class="habit-pts">🏅 <b>${escHtml(ptsHint)}</b></div>
      ${inputUI}
      <div class="pts-preview" id="ptsPreview">+${curPts} نقطة الآن</div>
    </div>

    <div class="btns">
      <button class="btn btn-ghost" id="prevQ" ${habitFlow.index===0?"disabled":""}>← السابق</button>
      <button class="btn btn-primary" id="nextQ">${habitFlow.index===total-1?"✅ إنهاء القسم":"التالي →"}</button>
    </div>
    <div class="hr"></div>
    <div class="btns">
      <button class="btn btn-ghost" id="backStep">↩ رجوع</button>
      <button class="btn btn-ok"    id="skipStep">تجاوز ⏭</button>
    </div>
  </div>`;

  const updatePreview=()=>{
    const pv=$("#ptsPreview"); if(!pv) return;
    let p=0;
    if(h.type==="count"){
      p=(h.pointsPerUnit||0)*Math.max(0,Number($("#cnt")?.value||0));
    } else {
      p=$("#done")?.checked?(h.points||0):(!$("#done")?.checked&&h.penaltyIfFalse?-h.penaltyIfFalse:0);
    }
    pv.textContent=(p>=0?"+":"")+p+" نقطة الآن";
    pv.style.color=p>0?"var(--gold)":p<0?"var(--red)":"var(--muted)";
  };

  if(h.type==="bool"){
    const dEl=$("#done"),nEl=$("#notd");
    dEl.onchange=()=>{ if(dEl.checked)nEl.checked=false; updatePreview(); };
    nEl.onchange=()=>{ if(nEl.checked)dEl.checked=false; updatePreview(); };
  } else {
    $("#cnt").oninput=updatePreview;
  }

  const saveCur=()=>{
    if(h.type==="count"){
      const c=Math.max(0,Number($("#cnt").value||0));
      state.answers[h.id]={done:c>0,count:c};
    } else {
      state.answers[h.id]={done:$("#done").checked,count:0};
    }
    saveState(); refreshPts();
  };

  $("#prevQ").onclick=()=>{ saveCur(); habitFlow.index=Math.max(0,habitFlow.index-1); renderHabitStep(section); };
  $("#nextQ").onclick=()=>{
    saveCur();
    if(habitFlow.index<total-1){ habitFlow.index++; renderHabitStep(section); }
    else{ habitFlow.index=0; go(+1); }
  };
  $("#backStep").onclick=()=>{ saveCur(); go(-1); };
  $("#skipStep").onclick=()=>{ saveCur(); habitFlow.index=0; go(+1); };
}

          <div class="score-item">
            <div class="score-item-val">${S.doneTotal}/${S.totalTotal}</div>
            <div class="score-item-lbl">عادات منجزة</div>
          </div>
          <div class="score-item">
            <div class="score-item-val">${S.doneRamadan}/${S.totalRamadan}</div>
            <div class="score-item-lbl">🌙 رمضان</div>
          </div>
          <div class="score-item">
            <div class="score-item-val">${S.doneDaily}/${S.totalDaily}</div>
            <div class="score-item-lbl">🌿 القبيلة</div>
          </div>
          <div class="score-item">
            <div class="score-item-val" style="color:${S.points>=500?"var(--green)":S.points>=200?"var(--gold)":"var(--muted)"}">${S.points>=700?"⭐ ممتاز":S.points>=500?"💪 جيد جداً":S.points>=200?"👍 جيد":"ابدأ!"}</div>
            <div class="score-item-lbl">التقييم</div>
          </div>
        </div>
      </div>
    </div>

    <label class="field-label" style="margin-bottom:8px">التقرير</label>
    <textarea class="report-box" id="reportText" readonly>${escHtml(report)}</textarea>

    <div class="btns btns-col" style="margin-top:14px">
      <button class="btn btn-primary btn-full" id="copy">📋 نسخ التقرير</button>
      <button class="btn btn-ok    btn-full" id="saveToday">💾 حفظ نسخة اليوم</button>
    </div>
    <div class="btns" style="margin-top:8px">
      <button class="btn btn-ghost"  id="prev">← السابق</button>
      <button class="btn btn-danger" id="clear">🗑 مسح البيانات</button>
    </div>
    <div class="hr"></div>
    <div class="small">💾 البيانات محفوظة محلياً على جهازك فقط.</div>
  </div>`;

  $("#copy").onclick=async()=>{
    try{ await navigator.clipboard.writeText(report); toast("تم النسخ ✅"); }
    catch{ const ta=$("#reportText"); ta.select(); document.execCommand("copy"); toast("تم النسخ ✅"); }
  };
  $("#saveToday").onclick=()=>{
    const arch=JSON.parse(localStorage.getItem("tribe_reports_archive_v2")||"[]");
    arch.unshift({dateISO:state.dateISO||todayISO,hijriDate:state.hijriDate,points:S.points,report});
    localStorage.setItem("tribe_reports_archive_v2",JSON.stringify(arch.slice(0,90)));
    toast("تم الحفظ ✅");
  };
  $("#prev").onclick=()=>go(-1);
  $("#clear").onclick=()=>{
    if(!confirm("مسح كل البيانات؟")) return;
    localStorage.removeItem(KEY);
    toast("تم المسح"); location.reload();
  };
}

/* ─────────────────────────────────────────
   RENDER
───────────────────────────────────────── */
function render(){
  setProgress();
  const id=steps[stepIdx].id;
  if(id==="intro")          renderIntro();
  else if(id==="habits_ramadan") renderHabitStep("ramadan");
  else if(id==="habits_daily")   renderHabitStep("daily");
  else if(id==="avoided")   renderAvoided();
  else if(id==="gratitude") renderGratitude();
  else if(id==="feeling")   renderFeeling();
  else if(id==="summary")   renderSummary();
  else if(id==="motivation") renderMotivation();
  else if(id==="report")    renderReport();
}

render();
})();
</script>
</body>
</html>
